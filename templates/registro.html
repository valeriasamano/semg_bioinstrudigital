<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Clínico - sEMG</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center h-screen">
    <div class="bg-white p-10 rounded-sm shadow-xl border border-gray-100 max-w-sm w-full">
        <div class="text-center mb-10">
            <h2 class="text-2xl font-light text-slate-800 uppercase tracking-tighter">Nuevo Registro</h2>
            <p class="text-[10px] text-[#A3D133] font-bold uppercase tracking-[0.3em] mt-2">Personal de Ingeniería Clínica</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="handleGoogle()" class="flex items-center justify-center gap-2 border border-[#A3D133]/20 py-3 rounded-md hover:bg-[#A3D133]/5 transition-all shadow-sm">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-4 h-4">
                <span class="text-[9px] font-black uppercase tracking-widest text-slate-500">Google</span>
            </button>
            <button class="flex items-center justify-center gap-2 bg-[#2F2F2F] py-3 rounded-md opacity-50 cursor-not-allowed">
                <img src="https://www.svgrepo.com/show/331495/microsoft.svg" class="w-4 h-4">
                <span class="text-[9px] font-black uppercase tracking-widest text-white">Microsoft</span>
            </button>
        </div>

        <form method="POST" class="space-y-6">
            <input type="text" name="username" placeholder="Usuario ID" class="w-full border-b border-gray-200 py-2 focus:border-[#A3D133] outline-none text-sm" required>
            <input type="password" name="password" placeholder="Contraseña" class="w-full border-b border-gray-200 py-2 focus:border-[#A3D133] outline-none text-sm" required>
            <button type="submit" class="w-full bg-slate-900 text-white py-4 text-[10px] font-bold uppercase tracking-widest hover:bg-[#A3D133] transition-all">Crear Cuenta</button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="/login" class="text-[10px] font-bold text-gray-400 hover:text-blue-500 transition uppercase tracking-widest">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB18-JLdzix9vqyp11VBEcjXiVAm4p8dEg",
            authDomain: "bioinstrudigitaleq6.firebaseapp.com",
            projectId: "bioinstrudigitaleq6",
            storageBucket: "bioinstrudigitaleq6.firebasestorage.app",
            appId: "1:993054277520:web:be3101c71dbfd8f6557d15"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleGoogle = () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider)
                .then((result) => {
                    return fetch('/login-google', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: result.user.email })
                    });
                })
                .then(res => res.json())
                .then(data => { if(data.success) window.location.assign("/"); })
                .catch(err => console.error(err));
        };
    </script>
</body>
</html>
